<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src ws://localhost:* ws://127.0.0.1:*; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
<title>GB Input Display</title>
<style>
/* === Reset & Base === */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: transparent;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

/* === Overlay Container === */
.overlay {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  padding: 8px;
}
/* === Status indicator === */
.status {
  position: fixed;
  bottom: 4px;
  right: 8px;
  font-size: 9px;
  color: rgba(255,255,255,0.4);
  font-family: monospace;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s;
}
.status.visible { opacity: 1; }
.status.error { color: rgba(255,100,100,0.6); }

/* === Accessibility === */
@media (prefers-reduced-motion: reduce) {
  .btn-base, .btn-base.pressed,
  .dpad-body, .dpad-surface, .dpad-arrow,
  .pill-body, .pill-surface,
  .btn-a-body, .btn-a-surface, .btn-b-body, .btn-b-surface {
    transition: none !important;
  }
  .btn-base.pressed { transform: none; filter: none; }
}
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" width="640" height="200" class="theme-player-silver" style="max-width:100%;height:auto;">
    <defs>
      <style>
        /* ── CSS Custom Properties (themeable) ── */
        :root {
          --faceplate-bg:         #cdcdc9;
          --faceplate-seam:       #b8b8b2;
          --faceplate-seam-high:  #ddddd6;
          --faceplate-gradient-1: #d4d4cf;
          --faceplate-gradient-2: #c6c6c0;
          --dpad-bg:            #3a3a38;
          --dpad-highlight:     #4e4e4b;
          --dpad-shadow:        #262624;
          --dpad-surface:       #424240;
          --dpad-arrow:         #6e6e69;
          --btn-a-bg:           #4a5a7a;
          --btn-a-highlight:    #5c6f94;
          --btn-a-shadow:       #35425a;
          --btn-a-surface:      #505f80;
          --btn-b-bg:           #5a4a7a;
          --btn-b-highlight:    #705c94;
          --btn-b-shadow:       #42355a;
          --btn-b-surface:      #605080;
          --btn-start-bg:       #7a7a74;
          --btn-start-highlight:#8f8f88;
          --btn-start-shadow:   #5e5e58;
          --btn-pill-surface:   #82827c;
          --label-color:        #7a7a72;
          --label-highlight:    #8f8f88;
          --press-y:            1.5px;
          --press-speed:       0.05s;
          --release-speed:     0.12s;
          --transition-speed:  0.1s;
        }

        /* ── Faceplate body ── */
        .faceplate { fill: var(--faceplate-bg); }
        .faceplate-grad { fill: url(#faceplate-grad); }
        .seam-top { stroke: var(--faceplate-seam); stroke-width: 1; fill: none; opacity: 0.6; }
        .seam-high { stroke: var(--faceplate-seam-high); stroke-width: 1; fill: none; opacity: 0.4; }

        /* ── Button base ── */
        .btn-base {
          transition: transform var(--press-speed) ease, filter var(--release-speed) ease;
        }
        .btn-base.pressed {
          transform: translateY(var(--press-y));
          filter: brightness(0.88);
        }

        /* ── D-pad ── */
        .dpad-body { fill: var(--dpad-bg); transition: fill 0.06s ease; }
        .dpad-highlight { fill: var(--dpad-highlight); transition: fill 0.06s ease; }
        .dpad-shadow { fill: var(--dpad-shadow); }
        .dpad-surface { fill: var(--dpad-surface); transition: fill 0.06s ease; }
        .dpad-arrow { fill: var(--dpad-arrow); transition: fill 0.06s ease; }
        .dpad-group.pressed .dpad-surface,
        .dpad-group.pressed .dpad-arrow { fill: var(--dpad-shadow); }

        /* ── Pill buttons (Start/Select) ── */
        .pill-body { fill: var(--btn-start-bg); transition: fill 0.06s ease; }
        .pill-highlight { fill: var(--btn-start-highlight); }
        .pill-shadow { fill: var(--btn-start-shadow); }
        .pill-surface { fill: var(--btn-pill-surface); transition: fill 0.06s ease; }
        .pill-group.pressed .pill-body,
        .pill-group.pressed .pill-surface { fill: var(--btn-start-shadow); }

        /* ── Face buttons (A/B) ── */
        .btn-a-body { fill: var(--btn-a-bg); transition: fill 0.06s ease; }
        .btn-a-highlight { fill: var(--btn-a-highlight); }
        .btn-a-shadow { fill: var(--btn-a-shadow); }
        .btn-a-surface { fill: var(--btn-a-surface); transition: fill 0.06s ease; }
        .btn-b-body { fill: var(--btn-b-bg); transition: fill 0.06s ease; }
        .btn-b-highlight { fill: var(--btn-b-highlight); }
        .btn-b-shadow { fill: var(--btn-b-shadow); }
        .btn-b-surface { fill: var(--btn-b-surface); transition: fill 0.06s ease; }
        .btn-a-group.pressed .btn-a-surface,
        .btn-a-group.pressed .btn-a-body { fill: var(--btn-a-shadow); }
        .btn-b-group.pressed .btn-b-surface,
        .btn-b-group.pressed .btn-b-body { fill: var(--btn-b-shadow); }

        /* ── Labels ── */
        .label {
          font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
          font-size: 9px; font-weight: 600; letter-spacing: 1.5px;
          fill: var(--label-color); text-anchor: middle; dominant-baseline: central;
        }
      </style>

      <linearGradient id="faceplate-grad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--faceplate-gradient-1)"/>
        <stop offset="50%" stop-color="var(--faceplate-gradient-2)"/>
        <stop offset="100%" stop-color="var(--faceplate-gradient-1)"/>
      </linearGradient>

      <!-- D-pad cross shape -->
      <path id="dpad-cross" d="M 38,28 L 62,28 L 62,38 L 72,38 L 72,62 L 62,62 L 62,72 L 38,72 L 38,62 L 28,62 L 28,38 L 38,38 Z"/>
    </defs>

    <!-- ═══ FACEPLATE ═══ -->
    <rect x="4" y="6" width="632" height="188" rx="24" ry="24" class="faceplate-grad" opacity="0.85"/>
    <rect x="4" y="6" width="632" height="188" rx="24" ry="24" fill="none" stroke="var(--faceplate-seam-high)" stroke-width="0.8" opacity="0.3"/>
    <line x1="30" y1="160" x2="610" y2="160" class="seam-top"/>
    <line x1="30" y1="161" x2="610" y2="161" class="seam-high"/>
    <circle cx="30" cy="30" r="3.5" fill="var(--faceplate-seam)" opacity="0.35"/>
    <circle cx="30" cy="172" r="3.5" fill="var(--faceplate-seam)" opacity="0.35"/>
    <circle cx="610" cy="30" r="3.5" fill="var(--faceplate-seam)" opacity="0.35"/>
    <circle cx="610" cy="172" r="3.5" fill="var(--faceplate-seam)" opacity="0.35"/>

    <!-- ═══ D-PAD (LEFT) ═══ -->
    <g transform="translate(70, 60)" class="btn-base">
      <use href="#dpad-cross" class="dpad-shadow" transform="translate(1, 2)" opacity="0.35"/>

      <g class="dpad-group btn-base" data-action="up">
        <use href="#dpad-cross" class="dpad-body"/>
      </g>
      <g class="dpad-group btn-base" data-action="down">
        <use href="#dpad-cross" class="dpad-body"/>
      </g>
      <g class="dpad-group btn-base" data-action="left">
        <use href="#dpad-cross" class="dpad-body"/>
      </g>
      <g class="dpad-group btn-base" data-action="right">
        <use href="#dpad-cross" class="dpad-body"/>
      </g>

      <circle cx="50" cy="50" r="12" fill="var(--dpad-bg)" stroke="var(--dpad-highlight)" stroke-width="0.5"/>
      <circle cx="50" cy="50" r="10" fill="var(--dpad-surface)" opacity="0.6"/>
      <rect x="30" y="39" width="40" height="22" rx="2" fill="var(--dpad-surface)" opacity="0.3"/>
      <rect x="39" y="30" width="22" height="40" rx="2" fill="var(--dpad-surface)" opacity="0.3"/>
      <rect x="40" y="31" width="20" height="8" rx="1.5" fill="var(--dpad-highlight)" opacity="0.25"/>

      <polygon points="50,34 46,40 54,40" class="dpad-arrow" opacity="0.5"/>
      <polygon points="50,66 46,60 54,60" class="dpad-arrow" opacity="0.5"/>
      <polygon points="34,50 40,46 40,54" class="dpad-arrow" opacity="0.5"/>
      <polygon points="66,50 60,46 60,54" class="dpad-arrow" opacity="0.5"/>
    </g>

    <!-- ═══ START + SELECT (CENTER) ═══ -->
    <g transform="translate(270, 82)" class="btn-base">
      <rect x="0" y="0" width="36" height="16" rx="8" fill="var(--btn-start-shadow)" opacity="0.3" transform="translate(0, 2)"/>
      <g class="pill-group btn-base" data-action="start">

    <g transform="translate(330, 82)" class="btn-base">
      <rect x="0" y="0" width="36" height="16" rx="8" fill="var(--btn-start-shadow)" opacity="0.3" transform="translate(0, 2)"/>
      <g class="pill-group btn-base" data-action="select">
        <rect x="0" y="0" width="36" height="16" rx="8" class="pill-body"/>
        <rect x="2" y="1" width="32" height="6" rx="3" class="pill-highlight" opacity="0.3"/>
        <rect x="3" y="3" width="30" height="4" rx="2" class="pill-surface" opacity="0.15"/>
      </g>
    </g>
    <text x="288" y="108" class="label">Start</text>
    <text x="348" y="108" class="label">Select</text>

    <!-- ═══ B + A (RIGHT) ═══ -->

      <circle cx="26" cy="26" r="22" fill="var(--btn-b-shadow)" opacity="0.2" transform="translate(0, 2)"/>

        <ellipse cx="24" cy="20" rx="10" ry="6" class="btn-b-surface" opacity="0.12"/>
        <circle cx="26" cy="26" r="14" fill="var(--btn-b-surface)" opacity="0.08"/>

      <text x="26" y="58" class="label">B</text>

    <g transform="translate(510, 60)" class="btn-base">
      <circle cx="26" cy="26" r="22" fill="var(--btn-a-shadow)" opacity="0.2" transform="translate(0, 2)"/>
      <g class="btn-a-group btn-base" data-action="a">
        <circle cx="26" cy="26" r="22" class="btn-a-body"/>
        <circle cx="26" cy="26" r="20" fill="var(--btn-a-shadow)" opacity="0.12"/>
        <path d="M 10,14 A 20,20 0 0,1 42,14" class="btn-a-highlight" opacity="0.35" fill="none" stroke-width="3" stroke-linecap="round"/>
        <ellipse cx="24" cy="20" rx="10" ry="6" class="btn-a-surface" opacity="0.15"/>
        <circle cx="26" cy="26" r="14" fill="var(--btn-a-surface)" opacity="0.08"/>
      </g>
      <text x="26" y="58" class="label">A</text>
    </g>

    <!-- ═══ BRANDING ═══ -->
    <text x="570" y="148" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="7px" font-weight="400" letter-spacing="1px" fill="var(--faceplate-seam)" opacity="0.5" text-anchor="end" dominant-baseline="central">GB INPUT DISPLAY</text>
    <text x="570" y="156" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="6px" font-weight="300" letter-spacing="0.8px" fill="var(--faceplate-seam)" opacity="0.35" text-anchor="end" dominant-baseline="central">PLAYER SILVER</text>
  </svg>

  <!-- ═══ MINIMAL THEME (buttons only, no faceplate) ═══ -->
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 140" width="440" height="140" class="theme-minimal" style="display:none;max-width:100%;height:auto;">

    <!-- ═══ D-PAD (LEFT) ═══ -->
    <g transform="translate(30, 30)" class="btn-base">
      <use href="#dpad-cross" class="dpad-shadow" transform="translate(1, 2)" opacity="0.35"/>

      <g class="dpad-group btn-base" data-action="up">
        <use href="#dpad-cross" class="dpad-body"/>
      </g>
      <g class="dpad-group btn-base" data-action="down">

      <rect x="30" y="39" width="40" height="22" rx="2" fill="var(--dpad-surface)" opacity="0.3"/>

      <polygon points="50,34 46,40 54,40" class="dpad-arrow" opacity="0.5"/>

      <polygon points="34,50 40,46 40,54" class="dpad-arrow" opacity="0.5"/>
      <polygon points="66,50 60,46 60,54" class="dpad-arrow" opacity="0.5"/>
    </g>

    <!-- ═══ START + SELECT (CENTER) ═══ -->
    <g transform="translate(195, 52)" class="btn-base">
      <rect x="0" y="0" width="36" height="16" rx="8" fill="var(--btn-start-shadow)" opacity="0.3" transform="translate(0, 2)"/>

    <!-- ═══ B + A (RIGHT) ═══ -->
    <g transform="translate(310, 30)" class="btn-base">
      <circle cx="26" cy="26" r="22" fill="var(--btn-b-shadow)" opacity="0.2" transform="translate(0, 2)"/>
      <g class="btn-b-group btn-base" data-action="b">

  <!-- ═══ DMG THEME (original gray Game Boy) ═══ -->

    <style>
      /* DMG color overrides — warm gray shell, magenta buttons */

      .theme-dmg .dpad-surface { fill: #4a4540; }

    <!-- ═══ FACEPLATE — Classic DMG warm gray ═══ -->
    <rect x="4" y="6" width="632" height="188" rx="24" ry="24" fill="url(#faceplate-grad)" opacity="0.9"/>

<div class="status" id="status">● connected</div>

<script>
// ============================================================
// GB Input Display — Browser Source Renderer v0.2
// ============================================================

// Action state for GB buttons (l/r are GBA-only, hidden in GB theme)
const ACTIONS = ['up', 'down', 'left', 'right', 'a', 'b', 'start', 'select'];
const state = Object.fromEntries(ACTIONS.map(a => [a, false]));

// === Status Indicator (persists when disconnected) ===
const statusEl = document.getElementById('status');
let statusPersistent = false;

function setStatus(msg, isError = false, persistent = false) {
  statusEl.textContent = msg;
  statusEl.classList.add('visible');
  statusEl.classList.toggle('error', isError);
  statusPersistent = persistent;
  if (!persistent) {
    setTimeout(() => { if (!statusPersistent) statusEl.classList.remove('visible'); }, 3000);
  }
}

// === DOM References + Validation ===
const buttonEls = {};
for (const action of ACTIONS) buttonEls[action] = [];
document.querySelectorAll('[data-action]').forEach(el => {
  const action = el.dataset.action;
  if (buttonEls[action]) buttonEls[action].push(el);
});
const missingActions = ACTIONS.filter(a => buttonEls[a].length === 0);
if (missingActions.length > 0) {
  console.warn('GB Input Display: missing SVG elements for actions:', missingActions.join(', '));
}
if (Object.values(buttonEls).every(arr => arr.length === 0)) {
  setStatus('no theme elements found — check SVG markup', true, true);
}

// === Render Loop ===
function render() {
  for (const [action, pressed] of Object.entries(state)) {
    const els = buttonEls[action];
    if (els) els.forEach(el => el.classList.toggle('pressed', pressed));
  }
  requestAnimationFrame(render);
}
requestAnimationFrame(render);

// === Keyboard Mapping ===
const KEY_MAP = {
  'ArrowUp': 'up', 'KeyW': 'up',
  'ArrowDown': 'down', 'KeyS': 'down',
  'ArrowLeft': 'left', 'KeyA': 'left',
  'ArrowRight': 'right', 'KeyD': 'right',
  'KeyX': 'a', 'KeyZ': 'b',
  'Enter': 'start',
  'ShiftRight': 'select', 'Backspace': 'select',
};

// === Input Overlay WebSocket Client ===
const urlParams = new URLSearchParams(window.location.search);
const WS_URL = urlParams.get('ws') || 'ws://localhost:16899';
let ws = null;
let wsReconnectTimer = null;
let wsConnected = false;
let reconnectDelay = 2000;
let reconnectAttempts = 0;
const MAX_RECONNECT_DELAY = 60000;
const MAX_RECONNECT_ATTEMPTS = 30;

function connectWebSocket() {
  if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
  
  try {
    ws = new WebSocket(WS_URL);
  } catch (e) {
    scheduleReconnect();
    return;
  }

  ws.onopen = () => {
    wsConnected = true;
    reconnectDelay = 2000;
    reconnectAttempts = 0;
    setStatus('● connected');
  };

  ws.onmessage = (evt) => {
    try {
      handleIOMessage(JSON.parse(evt.data));
    } catch (e) {
      console.warn('GB Input Display: unparseable WebSocket message');
    }
  };

  ws.onclose = () => {
    wsConnected = false;
    scheduleReconnect();
    clearAllInputs();
  };

  ws.onerror = () => { /* onclose fires after */ };
}

function scheduleReconnect() {
  if (wsReconnectTimer) return;
  if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
    setStatus('WebSocket unavailable — keyboard only', true, true);
    return;
  }
  reconnectAttempts++;
  setStatus(`reconnecting (${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS})…`, true, true);
  wsReconnectTimer = setTimeout(() => {
    wsReconnectTimer = null;
    connectWebSocket();
  }, reconnectDelay);
  reconnectDelay = Math.min(reconnectDelay * 2, MAX_RECONNECT_DELAY);
}

// === Input Overlay Message Handler ===
function handleIOMessage(msg) {
  if (msg.keyboard && msg.keys) {
    handleKeyboardState(msg.keys);
  } else if (msg.gamepad !== undefined && msg.buttons) {
    handleGamepadState(msg.buttons, msg.axes, msg.dpad);
  } else if (msg.keyCode !== undefined) {
    handleKeyEvent(msg);
  }
}

function handleKeyboardState(keys) {
  const kbActions = new Set();
  for (const key of keys) {
    const action = KEY_MAP[key.code || key];
    if (action) kbActions.add(action);
  }
  for (const action of ACTIONS) {
    state[action] = kbActions.has(action);
  }
}

// Helper: treat any truthy value or number > 0.5 as pressed
function isPressed(val) {
  if (typeof val === 'number') return val > 0.5;
  return !!val;
}

function handleGamepadState(buttons, axes, dpad) {
  if (dpad) {
    state.up = isPressed(dpad[0]);
    state.down = isPressed(dpad[1]);
    state.left = isPressed(dpad[2]);
    state.right = isPressed(dpad[3]);
  }
  
  if (buttons) {
    state.b = isPressed(buttons[0]);  // XInput A → GB B
    state.a = isPressed(buttons[1]);  // XInput B → GB A
    state.select = isPressed(buttons[8]) || isPressed(buttons[6]);
    state.start = isPressed(buttons[9]) || isPressed(buttons[7]);
  }
  
  // Analog stick → D-pad fallback (no hat switch)
  if (axes && !dpad && axes.length >= 2) {
    const DEADZONE = 0.5;
    if (!state.up && !state.down) {
      state.up = axes[1] < -DEADZONE;
      state.down = axes[1] > DEADZONE;
    }
    if (!state.left && !state.right) {
      state.left = axes[0] < -DEADZONE;
      state.right = axes[0] > DEADZONE;
    }
  }
}

function handleKeyEvent(msg) {
  const action = KEY_MAP[msg.code];
  if (action) state[action] = msg.state === 'down' || msg.pressed === true;
}

function clearAllInputs() {
  for (const k of Object.keys(state)) state[k] = false;
}

// === Keyboard Fallback (only when WebSocket is NOT connected) ===
document.addEventListener('keydown', (e) => {
  if (wsConnected) return;
  const action = KEY_MAP[e.code];
  if (action) { e.preventDefault(); state[action] = true; }
});

document.addEventListener('keyup', (e) => {
  if (wsConnected) return;
  const action = KEY_MAP[e.code];
  if (action) { e.preventDefault(); state[action] = false; }
});

// === Boot ===
// Theme selection via ?theme= URL param
(function initTheme() {
  const themeName = urlParams.get('theme') || 'player-silver';
  document.querySelectorAll('svg[class^="theme-"]').forEach(svg => {
    const tc = [...svg.classList].find(c => c.startsWith('theme-'));
    svg.style.display = tc === `theme-${themeName}` ? '' : 'none';
  });
})();

connectWebSocket();

// Show keyboard-only status if WebSocket doesn't connect within 5s
setTimeout(() => {
  if (!wsConnected && reconnectAttempts === 0) {
    setStatus('no WebSocket — keyboard only', true, true);
  }
}, 5000);
</script>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 140" width="440" height="140">
  <defs>
    <path id="dpad-cross" d="M 38,28 L 62,28 L 62,38 L 72,38 L 72,62 L 62,62 L 62,72 L 38,72 L 38,62 L 28,62 L 28,38 L 38,38 Z"/>
  </defs>

  <!-- D-Pad -->
  <g transform="translate(30, 30)" class="btn-base">
    <use href="#dpad-cross" fill="#262624" transform="translate(1, 2)" opacity="0.35"/>

    <g class="dpad-group btn-base" data-action="up">
      <use href="#dpad-cross" fill="#3a3a38"/>
    </g>
    <g class="dpad-group btn-base" data-action="down">
      <use href="#dpad-cross" fill="#3a3a38"/>
    </g>
    <g class="dpad-group btn-base" data-action="left">
      <use href="#dpad-cross" fill="#3a3a38"/>
    </g>
    <g class="dpad-group btn-base" data-action="right">
      <use href="#dpad-cross" fill="#3a3a38"/>
    </g>

    <circle cx="50" cy="50" r="12" fill="#3a3a38" stroke="#4e4e4b" stroke-width="0.5"/>
    <circle cx="50" cy="50" r="10" fill="#424240" opacity="0.6"/>
    <rect x="30" y="39" width="40" height="22" rx="2" fill="#424240" opacity="0.3"/>
    <rect x="39" y="30" width="22" height="40" rx="2" fill="#424240" opacity="0.3"/>
    <polygon points="50,34 46,40 54,40" fill="#6e6e69" opacity="0.5"/>
    <polygon points="50,66 46,60 54,60" fill="#6e6e69" opacity="0.5"/>
    <polygon points="34,50 40,46 40,54" fill="#6e6e69" opacity="0.5"/>
    <polygon points="66,50 60,46 60,54" fill="#6e6e69" opacity="0.5"/>
  </g>

  <!-- Start -->
  <g transform="translate(195, 52)" class="btn-base">
    <rect x="0" y="0" width="36" height="16" rx="8" fill="#5e5e58" opacity="0.3" transform="translate(0, 2)"/>
    <g class="pill-group btn-base" data-action="start">
      <rect x="0" y="0" width="36" height="16" rx="8" fill="#7a7a74"/>
      <rect x="2" y="1" width="32" height="6" rx="3" fill="#8f8f88" opacity="0.3"/>
      <rect x="3" y="3" width="30" height="4" rx="2" fill="#82827c" opacity="0.15"/>
    </g>
  </g>

  <!-- Select -->
  <g transform="translate(195, 52)" class="btn-base">
    <rect x="0" y="20" width="36" height="16" rx="8" fill="#5e5e58" opacity="0.3" transform="translate(0, 2)"/>
    <g class="pill-group btn-base" data-action="select">
      <rect x="0" y="20" width="36" height="16" rx="8" fill="#7a7a74"/>
      <rect x="2" y="21" width="32" height="6" rx="3" fill="#8f8f88" opacity="0.3"/>
      <rect x="3" y="23" width="30" height="4" rx="2" fill="#82827c" opacity="0.15"/>
    </g>
  </g>

  <!-- B Button -->
  <g transform="translate(310, 30)" class="btn-base">
    <circle cx="26" cy="26" r="22" fill="#42355a" opacity="0.2" transform="translate(0, 2)"/>
    <g class="btn-b-group btn-base" data-action="b">
      <circle cx="26" cy="26" r="22" fill="#5a4a7a"/>
      <circle cx="26" cy="26" r="20" fill="#42355a" opacity="0.15"/>
      <path d="M 10,14 A 20,20 0 0,1 42,14" fill="none" stroke="#705c94" stroke-width="3" opacity="0.3" stroke-linecap="round"/>
    </g>
  </g>

  <!-- A Button -->
  <g transform="translate(370, 30)" class="btn-base">
    <circle cx="26" cy="26" r="22" fill="#35425a" opacity="0.2" transform="translate(0, 2)"/>
    <g class="btn-a-group btn-base" data-action="a">
      <circle cx="26" cy="26" r="22" fill="#4a5a7a"/>
      <circle cx="26" cy="26" r="20" fill="#35425a" opacity="0.12"/>
      <path d="M 10,14 A 20,20 0 0,1 42,14" fill="none" stroke="#5c6f94" stroke-width="3" opacity="0.35" stroke-linecap="round"/>
    </g>
  </g>
</svg>

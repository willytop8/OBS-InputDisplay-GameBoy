<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 170" width="580" height="170">
  <defs>
    <path id="dpad-cross" d="M 38,28 L 62,28 L 62,38 L 72,38 L 72,62 L 62,62 L 62,72 L 38,72 L 38,62 L 28,62 L 28,38 L 38,38 Z"/>
  </defs>

  <!-- Translucent glacier shell — frosty blue-purple, like the original GBA Glacier -->
  <rect x="4" y="4" width="572" height="162" rx="18" fill="#6b9cc7" opacity="0.65"/>
  <rect x="4" y="4" width="572" height="162" rx="18" fill="none" stroke="#93bce0" stroke-width="1.5" opacity="0.45"/>

  <!-- Inner PCB visible through translucent shell -->
  <rect x="24" y="14" width="200" height="100" rx="6" fill="#1e3a5a" opacity="0.25"/>
  <rect x="260" y="14" width="296" height="100" rx="6" fill="#1e3a5a" opacity="0.12"/>

  <!-- Screen bezel -->
  <rect x="30" y="20" width="188" height="88" rx="4" fill="#1a2a3b" opacity="0.55"/>
  <rect x="34" y="24" width="180" height="80" rx="3" fill="#0f1a28" opacity="0.5"/>
  <!-- Screen label — GBA style -->
  <text x="124" y="66" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="6.5px" font-weight="700" letter-spacing="1.2px" fill="#6b9cc7" opacity="0.35" text-anchor="middle">GAME BOY</text>
  <text x="124" y="76" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="6px" letter-spacing="1px" fill="#8bbce0" opacity="0.3" text-anchor="middle">ADVANCE</text>

  <!-- L / R shoulder button indicators -->
  <rect x="24" y="5" width="16" height="4" rx="2" fill="#5b8cb7" opacity="0.3"/>
  <text x="32" y="8.5" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="4px" fill="#8bbce0" opacity="0.25" text-anchor="middle">L</text>
  <rect x="540" y="5" width="16" height="4" rx="2" fill="#5b8cb7" opacity="0.3"/>
  <text x="548" y="8.5" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="4px" fill="#8bbce0" opacity="0.25" text-anchor="middle">R</text>

  <!-- D-Pad -->
  <g transform="translate(60, 112)">
    <use href="#dpad-cross" fill="#1a2a35" transform="translate(1, 2)" opacity="0.3"/>
    <g data-action="up"><use href="#dpad-cross" fill="#3a4550"/></g>
    <g data-action="down"><use href="#dpad-cross" fill="#3a4550"/></g>
    <g data-action="left"><use href="#dpad-cross" fill="#3a4550"/></g>
    <g data-action="right"><use href="#dpad-cross" fill="#3a4550"/></g>
    <circle cx="50" cy="50" r="10" fill="#3a4550"/>
  </g>

  <!-- Select -->
  <g transform="translate(250, 118)">
    <rect x="0" y="0" width="36" height="12" rx="6" fill="#2a3540" opacity="0.3"/>
    <g data-action="select">
      <rect x="0" y="0" width="36" height="12" rx="6" fill="#5a6570"/>
      <rect x="2" y="1" width="32" height="4" rx="2" fill="#7a8590" opacity="0.25"/>
    </g>
  </g>

  <!-- Start -->
  <g transform="translate(300, 118)">
    <rect x="0" y="0" width="36" height="12" rx="6" fill="#2a3540" opacity="0.3"/>
    <g data-action="start">
      <rect x="0" y="0" width="36" height="12" rx="6" fill="#5a6570"/>
      <rect x="2" y="1" width="32" height="4" rx="2" fill="#7a8590" opacity="0.25"/>
    </g>
  </g>

  <!-- B -->
  <g transform="translate(420, 108)">
    <circle cx="22" cy="22" r="20" fill="#4a1530" opacity="0.2"/>
    <g data-action="b">
      <circle cx="22" cy="22" r="20" fill="#b84060"/>
      <circle cx="22" cy="22" r="18" fill="#6a2035" opacity="0.1"/>
      <path d="M 8,12 A 18,18 0 0,1 36,12" fill="none" stroke="#d06080" stroke-width="2.5" opacity="0.3" stroke-linecap="round"/>
    </g>
    <text x="22" y="50" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="7px" fill="#7a7874" opacity="0.5" text-anchor="middle" font-weight="600">B</text>
  </g>

  <!-- A -->
  <g transform="translate(472, 108)">
    <circle cx="22" cy="22" r="20" fill="#4a1530" opacity="0.2"/>
    <g data-action="a">
      <circle cx="22" cy="22" r="20" fill="#c86078"/>
      <circle cx="22" cy="22" r="18" fill="#6a2035" opacity="0.08"/>
      <path d="M 8,12 A 18,18 0 0,1 36,12" fill="none" stroke="#e08098" stroke-width="2.5" opacity="0.35" stroke-linecap="round"/>
    </g>
    <text x="22" y="50" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="7px" fill="#7a7874" opacity="0.5" text-anchor="middle" font-weight="600">A</text>
  </g>

  <!-- PCB traces visible through shell -->
  <line x1="238" y1="120" x2="238" y2="148" stroke="#3a5a7a" stroke-width="0.5" opacity="0.18"/>
  <line x1="400" y1="110" x2="400" y2="140" stroke="#3a5a7a" stroke-width="0.5" opacity="0.12"/>
</svg>

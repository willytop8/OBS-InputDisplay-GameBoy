<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" width="640" height="200">
  <defs>
    <style>
      /* ── CSS Custom Properties ── */
      :root {
        /* Faceplate */
        --faceplate-bg:         #cdcdc9;
        --faceplate-seam:       #b8b8b2;
        --faceplate-seam-high:  #ddddd6;
        --faceplate-gradient-1: #d4d4cf;
        --faceplate-gradient-2: #c6c6c0;

        /* D-pad */
        --dpad-bg:            #3a3a38;
        --dpad-highlight:     #4e4e4b;
        --dpad-shadow:        #262624;
        --dpad-surface:       #424240;
        --dpad-arrow:         #6e6e69;

        /* Face buttons */
        --btn-a-bg:           #4a5a7a;
        --btn-a-highlight:    #5c6f94;
        --btn-a-shadow:       #35425a;
        --btn-a-surface:      #505f80;
        --btn-b-bg:           #5a4a7a;
        --btn-b-highlight:    #705c94;
        --btn-b-shadow:       #42355a;
        --btn-b-surface:      #605080;

        /* Start / Select */
        --btn-start-bg:       #7a7a74;
        --btn-start-highlight:#8f8f88;
        --btn-start-shadow:   #5e5e58;
        --btn-pill-surface:   #82827c;

        /* Labels */
        --label-color:        #7a7a72;
        --label-highlight:    #8f8f88;

        /* Button-press displacement */
        --press-y:            1.5px;

        /* Transitions */
        --transition-speed:   0.1s;
      }

      /* ── Faceplate body ── */
      .faceplate {
        fill: var(--faceplate-bg);
      }
      .faceplate-grad {
        fill: url(#faceplate-grad);
      }
      .seam-top {
        stroke: var(--faceplate-seam);
        stroke-width: 1;
        fill: none;
        opacity: 0.6;
      }
      .seam-high {
        stroke: var(--faceplate-seam-high);
        stroke-width: 1;
        fill: none;
        opacity: 0.4;
      }

      /* ── Button base classes ── */
      .btn-base {
        transition: transform var(--transition-speed) ease, filter var(--transition-speed) ease;
        cursor: pointer;
      }
      .btn-base.pressed {
        transform: translateY(var(--press-y));
        filter: brightness(0.92) saturate(1.02);
      }

      /* ── D-pad ── */
      .dpad-body {
        fill: var(--dpad-bg);
        transition: fill var(--transition-speed) ease, transform var(--transition-speed) ease;
      }
      .dpad-highlight {
        fill: var(--dpad-highlight);
        transition: fill var(--transition-speed) ease;
      }
      .dpad-shadow {
        fill: var(--dpad-shadow);
        transition: fill var(--transition-speed) ease;
      }
      .dpad-surface {
        fill: var(--dpad-surface);
        transition: fill var(--transition-speed) ease;
      }
      .dpad-arrow {
        fill: var(--dpad-arrow);
        transition: fill var(--transition-speed) ease;
      }
      .dpad-body.pressed {
        transform: translateY(var(--press-y));
      }
      .dpad-body.pressed .dpad-surface {
        fill: var(--dpad-shadow);
      }

      /* ── Face buttons (A/B) ── */
      .btn-a-body {
        fill: var(--btn-a-bg);
      }
      .btn-a-highlight {
        fill: var(--btn-a-highlight);
      }
      .btn-a-shadow {
        fill: var(--btn-a-shadow);
      }
      .btn-a-surface {
        fill: var(--btn-a-surface);
      }
      .btn-b-body {
        fill: var(--btn-b-bg);
      }
      .btn-b-highlight {
        fill: var(--btn-b-highlight);
      }
      .btn-b-shadow {
        fill: var(--btn-b-shadow);
      }
      .btn-b-surface {
        fill: var(--btn-b-surface);
      }

      .btn-a-body.pressed .btn-a-surface,
      .btn-a-body.pressed {
        fill: var(--btn-a-shadow);
        transform: translateY(var(--press-y));
      }
      .btn-b-body.pressed .btn-b-surface,
      .btn-b-body.pressed {
        fill: var(--btn-b-shadow);
        transform: translateY(var(--press-y));
      }

      /* ── Pill buttons (Start/Select) ── */
      .pill-body {
        fill: var(--btn-start-bg);
      }
      .pill-highlight {
        fill: var(--btn-start-highlight);
      }
      .pill-shadow {
        fill: var(--btn-start-shadow);
      }
      .pill-surface {
        fill: var(--btn-pill-surface);
      }
      .pill-body.pressed .pill-surface,
      .pill-body.pressed {
        fill: var(--btn-start-shadow);
        transform: translateY(var(--press-y));
      }

      /* ── Labels ── */
      .label {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 1.5px;
        fill: var(--label-color);
        text-anchor: middle;
        dominant-baseline: central;
        text-transform: uppercase;
      }
      .label-highlight {
        fill: var(--label-highlight);
      }
      .label-shadow {
        fill: var(--faceplate-seam);
      }
    </style>

    <!-- Faceplate linear gradient for subtle molded-plastic sheen -->
    <linearGradient id="faceplate-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="var(--faceplate-gradient-1)"/>
      <stop offset="50%"  stop-color="var(--faceplate-gradient-2)"/>
      <stop offset="100%" stop-color="var(--faceplate-gradient-1)"/>
    </linearGradient>

    <!-- D-pad cross shape reusable path -->
    <g id="dpad-cross">
      <!-- Main cross body -->
      <path d="
        M 38,28
        L 62,28
        L 62,38
        L 72,38
        L 72,62
        L 62,62
        L 62,72
        L 38,72
        L 38,62
        L 28,62
        L 28,38
        L 38,38
        Z
      "/>
    </g>
  </defs>

  <!-- ═════════════════════════════════════════════════
       FACEPLATE — Warm silver molded plastic
       Transparent background, no bounding rect
       ═════════════════════════════════════════════════ -->

  <!-- Main chassis body with subtle rounded corners and gradient -->
  <rect x="4" y="6" width="632" height="188" rx="24" ry="24"
        class="faceplate-grad" opacity="0.85"/>

  <!-- Subtle inner edge highlight (top-left better lighting) -->
  <rect x="4" y="6" width="632" height="188" rx="24" ry="24"
        fill="none" stroke="var(--faceplate-seam-high)" stroke-width="0.8" opacity="0.3"/>

  <!-- Panel seam — horizontal division line, subtle molded-plastic look -->
  <line x1="30" y1="160" x2="610" y2="160"
        class="seam-top"/>
  <line x1="30" y1="161" x2="610" y2="161"
        class="seam-high"/>

  <!-- Small subtle screw-hole dots (upper corners & lower center) for realism -->
  <circle cx="30" cy="30" r="3.5"
          fill="var(--faceplate-seam)" opacity="0.35"/>
  <circle cx="30" cy="172" r="3.5"
          fill="var(--faceplate-seam)" opacity="0.35"/>
  <circle cx="610" cy="30" r="3.5"
          fill="var(--faceplate-seam)" opacity="0.35"/>
  <circle cx="610" cy="172" r="3.5"
          fill="var(--faceplate-seam)" opacity="0.35"/>

  <!-- ═════════════════════════════════════════════════
       D-PAD — Dark charcoal cross (LEFT side)
       ═════════════════════════════════════════════════ -->

  <g transform="translate(70, 60)" class="btn-base">
    <!-- D-pad drop shadow -->
    <use href="#dpad-cross" class="dpad-shadow" transform="translate(1, 2)" opacity="0.35"/>

    <!-- D-pad main body + pressed group -->
    <g class="dpad-body" data-action="up">
      <use href="#dpad-cross" class="dpad-body"/>
    </g>
    <g class="dpad-body" data-action="down">
      <use href="#dpad-cross" class="dpad-body"/>
    </g>
    <g class="dpad-body" data-action="left">
      <use href="#dpad-cross" class="dpad-body"/>
    </g>
    <g class="dpad-body" data-action="right">
      <use href="#dpad-cross" class="dpad-body"/>
    </g>

    <!-- D-pad center well (slightly recessed circle in middle) -->
    <circle cx="50" cy="50" r="12"
            fill="var(--dpad-bg)" stroke="var(--dpad-highlight)" stroke-width="0.5"/>
    <circle cx="50" cy="50" r="10"
            fill="var(--dpad-surface)" opacity="0.6"/>

    <!-- Horizontal arm surface (left & right) -->
    <rect x="30" y="39" width="40" height="22" rx="2"
          fill="var(--dpad-surface)" opacity="0.3"/>

    <!-- Vertical arm surface (up & down) -->
    <rect x="39" y="30" width="22" height="40" rx="2"
          fill="var(--dpad-surface)" opacity="0.3"/>

    <!-- Top arm surface highlight -->
    <rect x="40" y="31" width="20" height="8" rx="1.5"
          fill="var(--dpad-highlight)" opacity="0.25"/>

    <!-- ── Directional arrow indicators ── -->

    <!-- Up arrow -->
    <polygon points="50,34 46,40 54,40"
             class="dpad-arrow" data-action="up" opacity="0.5"/>
    <!-- Down arrow -->
    <polygon points="50,66 46,60 54,60"
             class="dpad-arrow" data-action="down" opacity="0.5"/>
    <!-- Left arrow -->
    <polygon points="34,50 40,46 40,54"
             class="dpad-arrow" data-action="left" opacity="0.5"/>
    <!-- Right arrow -->
    <polygon points="66,50 60,46 60,54"
             class="dpad-arrow" data-action="right" opacity="0.5"/>
  </g>

  <!-- ═════════════════════════════════════════════════
       START + SELECT — Small pill buttons (CENTER)
       ═════════════════════════════════════════════════ -->

  <!-- Start button -->
  <g transform="translate(270, 82)" class="btn-base">
    <rect x="0" y="0" width="36" height="16" rx="8" ry="8"
          fill="var(--btn-start-shadow)" opacity="0.3"
          transform="translate(0, 2)"/>
    <g class="pill-body" data-action="start">
      <rect x="0" y="0" width="36" height="16" rx="8" ry="8"
            class="pill-body"/>
      <rect x="2" y="1" width="32" height="6" rx="3"
            class="pill-highlight" opacity="0.3"/>
      <rect x="3" y="3" width="30" height="4" rx="2"
            class="pill-surface" opacity="0.15"/>
    </g>
  </g>

  <!-- Select button -->
  <g transform="translate(330, 82)" class="btn-base">
    <rect x="0" y="0" width="36" height="16" rx="8" ry="8"
          fill="var(--btn-start-shadow)" opacity="0.3"
          transform="translate(0, 2)"/>
    <g class="pill-body" data-action="select">
      <rect x="0" y="0" width="36" height="16" rx="8" ry="8"
            class="pill-body"/>
      <rect x="2" y="1" width="32" height="6" rx="3"
            class="pill-highlight" opacity="0.3"/>
      <rect x="3" y="3" width="30" height="4" rx="2"
            class="pill-surface" opacity="0.15"/>
    </g>
  </g>

  <!-- Start / Select labels (small, below pills) -->
  <text x="288" y="108" class="label">Start</text>
  <text x="348" y="108" class="label">Select</text>

  <!-- ═════════════════════════════════════════════════
       B + A — Face buttons (RIGHT side)
       B on left, A on right
       ═════════════════════════════════════════════════ -->

  <!-- B button -->
  <g transform="translate(440, 60)" class="btn-base">
    <!-- Shadow dish — subtle circular depression -->
    <circle cx="26" cy="26" r="22"
            fill="var(--btn-b-shadow)" opacity="0.2"
            transform="translate(0, 2)"/>
    <g class="btn-b-body" data-action="b">
      <!-- Outer ring / bezel -->
      <circle cx="26" cy="26" r="22"
              class="btn-b-body"/>
      <circle cx="26" cy="26" r="20"
              fill="var(--btn-b-shadow)" opacity="0.15"/>
      <!-- Top highlight arc -->
      <path d="M 10,14 A 20,20 0 0,1 42,14"
            class="btn-b-highlight" opacity="0.3" fill="none" stroke-width="3" stroke-linecap="round"/>
      <!-- Surface gleam -->
      <ellipse cx="24" cy="20" rx="10" ry="6"
               class="btn-b-surface" opacity="0.12"/>
      <!-- Center spot -->
      <circle cx="26" cy="26" r="14"
              fill="var(--btn-b-surface)" opacity="0.08"/>
    </g>
    <!-- B label (small, below button) -->
    <text x="26" y="58" class="label">B</text>
  </g>

  <!-- A button -->
  <g transform="translate(510, 60)" class="btn-base">
    <!-- Shadow dish -->
    <circle cx="26" cy="26" r="22"
            fill="var(--btn-a-shadow)" opacity="0.2"
            transform="translate(0, 2)"/>
    <g class="btn-a-body" data-action="a">
      <!-- Outer ring / bezel -->
      <circle cx="26" cy="26" r="22"
              class="btn-a-body"/>
      <circle cx="26" cy="26" r="20"
              fill="var(--btn-a-shadow)" opacity="0.12"/>
      <!-- Top highlight arc -->
      <path d="M 10,14 A 20,20 0 0,1 42,14"
            class="btn-a-highlight" opacity="0.35" fill="none" stroke-width="3" stroke-linecap="round"/>
      <!-- Surface gleam -->
      <ellipse cx="24" cy="20" rx="10" ry="6"
               class="btn-a-surface" opacity="0.15"/>
      <!-- Center spot -->
      <circle cx="26" cy="26" r="14"
              fill="var(--btn-a-surface)" opacity="0.08"/>
    </g>
    <!-- A label (small, below button) -->
    <text x="26" y="58" class="label">A</text>
  </g>

  <!-- ═════════════════════════════════════════════════
       DECORATIVE — Small brand text / model marking
       ═════════════════════════════════════════════════ -->

  <!-- Model marking (lower-right corner, subtle) -->
  <text x="570" y="148"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="7px"
        font-weight="400"
        letter-spacing="1px"
        fill="var(--faceplate-seam)"
        opacity="0.5"
        text-anchor="end"
        dominant-baseline="central">GB INPUT DISPLAY</text>
  <text x="570" y="156"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="6px"
        font-weight="300"
        letter-spacing="0.8px"
        fill="var(--faceplate-seam)"
        opacity="0.35"
        text-anchor="end"
        dominant-baseline="central">PLAYER SILVER</text>

</svg>
